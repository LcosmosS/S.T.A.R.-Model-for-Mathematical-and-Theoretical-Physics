name: S.T.A.R. CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install package
        run: python3 -m pip install -e ".[dev]"

      - name: Install package and TDA extras
        run: python3 -m pip install -e ".[dev,tda]"
        
      - name: Run tests
        run: python3 -m pytest -q

      - name: Verify sky survey datasets exist
        shell: bash -l {0}
        run: |
          ls -lh data/raw/*2MASS* || exit 1
          ls -lh data/raw/*SIMBAD* || exit 1
      
      - name: Upload sky survey datasets
        uses: actions/upload-artifact@v4
        with:
          name: sky-surveys
          path: |
            data/raw/JApJ94494_2MASS_GAIADR3_EPOCH.csv
            data/raw/DESIDR8_SDSSDR16_SIMBAD.csv
