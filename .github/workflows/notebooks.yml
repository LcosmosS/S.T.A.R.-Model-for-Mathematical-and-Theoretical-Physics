name: Notebook Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  execute-notebooks:
    runs-on: ubuntu-latest
    container:
      image: sagemath/sagemath:latest
      options: --user root
    env:
      DEBIAN_FRONTEND: noninteractive

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install modern Git and update submodules
        run: |
          apt-get update && apt-get install -y git
          git --version
          git submodule update --init --recursive --depth=1

      - name: Verify submodules
        run: |
          echo "=== Submodule Status ==="
          echo "ecdata  files:" $(find data/ecdata  -type f | wc -l 2>/dev/null || echo 0)
          echo "eclib   files:" $(find data/eclib   -type f | wc -l 2>/dev/null || echo 0)
          echo "lmfdb   files:" $(find data/lmfdb   -type f | wc -l 2>/dev/null || echo 0)

      - name: Install system tools
        run: |
          apt-get update
          apt-get install -y pandoc texlive texlive-latex-extra texlive-xetex

      - name: Install Python dependencies
        run: |
          sage -python -m pip install --upgrade pip setuptools wheel
          sage -python -m pip install --no-cache-dir \
            numpy pandas tqdm plotly==5.18.0 corner>=2.2.1 \
            ripser persim nbconvert nbclient ipykernel nest_asyncio

      - name: Prepare IPython runtime
        run: |
          export IPYTHONDIR=/tmp/.ipython
          mkdir -p "$IPYTHONDIR"
          chmod -R 0777 "$IPYTHONDIR"
          echo "IPYTHONDIR=$IPYTHONDIR" >> $GITHUB_ENV

      - name: Clear Python cache
        run: rm -rf __pycache__ */__pycache__ */*/__pycache__

      - name: Execute notebooks
        run: |
          mkdir -p results exports
          for nb in examples/*.ipynb; do
            echo "Running $nb"
            sage -python -m jupyter nbconvert \
              --to notebook \
              --execute "$nb" \
              --output "$(basename $nb .ipynb)-executed.ipynb" \
              --ExecutePreprocessor.timeout=2400
          done

      - name: Export HTML and PDF
        run: |
          mkdir -p exports
          for nb in examples/*-executed.ipynb; do
            base=$(basename "$nb" .ipynb)
            echo "Exporting $nb"
            sage -python -m jupyter nbconvert --to html "$nb" --output-dir exports --output "${base}.html"
            sage -python -m jupyter nbconvert --to pdf  "$nb" --output-dir exports --output "${base}.pdf"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: notebook-outputs
          path: |
            results/
            examples/*-executed.ipynb
            exports/
